  stalwart-mail-ha:
  - annotations:
      artifacthub.io/category: networking
      artifacthub.io/changes: |
        - kind: fixed
          description: Replaced 404 stalw.art logo URL with raw GitHub logo-red.svg and switched category from invalid "communication" to "networking" so ArtifactHub indexing succeeds
        - kind: fixed
          description: "config.json now uses Stalwart 0.16's `EnvironmentVariable`/`variableName` schema instead of legacy `EnvVar`/`envVar`"
        - kind: fixed
          description: "STALWART_RECOVERY_PASSWORD is rendered before STALWART_RECOVERY_ADMIN so K8s $(VAR) substitution resolves the password"
        - kind: changed
          description: "Fallback admin (STALWART_RECOVERY_ADMIN) is now wired whenever `recovery.adminPassword` or `recovery.existingSecret` is set, independent of `recovery.enabled` — this is the supported path for first-time login"
        - kind: added
          description: "values.yaml + examples + README cover cross-origin webmail (Bulwark) CORS setup with ingress-nginx annotations"
        - kind: added
          description: Initial release of Stalwart Mail HA chart for v0.16.x
      artifacthub.io/containsSecurityUpdates: "false"
      artifacthub.io/license: AGPL-3.0
