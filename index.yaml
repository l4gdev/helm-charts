  bulwark-mail:
  - annotations:
      artifacthub.io/category: communication
      artifacthub.io/changes: |
        - kind: added
          description: README + values.yaml comments now warn that `config.jmapServerUrl` is exposed to the browser via `/api/config` and must be publicly resolvable; cluster-internal Service names produce "Unable to reach the server"
        - kind: added
          description: README documents cross-origin requirements when webmail and JMAP server are on different hostnames (browser blocks credentialed requests without proper Allow-Credentials)
        - kind: changed
          description: Bumped Bulwark to 1.6.0 (subpath deployment, image attachment thumbnails, mobile-friendly admin)
        - kind: added
          description: NetworkPolicy, ServiceMonitor, optional PVC for settings sync, values.schema.json, examples, README
      artifacthub.io/containsSecurityUpdates: "false"
      artifacthub.io/license: AGPL-3.0
      artifacthub.io/links: |
