# Default values for bulwark-mail.
# Upstream image: https://github.com/bulwarkmail/webmail

replicaCount: 2

image:
  repository: ghcr.io/bulwarkmail/webmail
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

commonLabels: {}
commonAnnotations: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Topology
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: bulwark-mail
          topologyKey: kubernetes.io/hostname
topologySpreadConstraints: []
priorityClassName: ""

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# -----------------------------------------------------------------------------
# Ingress (native Kubernetes Ingress, multi-host TLS supported)
# -----------------------------------------------------------------------------
# A single Ingress with multiple hosts can serve multiple domains from one
# Bulwark deployment. Group hosts under one tls[] entry to use a single cert
# with multiple SANs.
ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/proxy-body-size: 50m
  hosts:
    - host: mail.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: bulwark-mail-tls
  #    hosts:
  #      - mail.example.com
  #      - webmail.example.com

# -----------------------------------------------------------------------------
# Probes
# -----------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 5
  failureThreshold: 12

# -----------------------------------------------------------------------------
# Bulwark configuration via env vars
# -----------------------------------------------------------------------------
# JMAP_SERVER_URL is required. Everything else is optional.
config:
  # Mail server (required)
  jmapServerUrl: "https://mail.example.com"
  hostname: "0.0.0.0"
  port: 3000

  # Branding (all optional)
  appName: ""
  appShortName: ""
  appDescription: ""
  faviconUrl: ""
  pwaIconUrl: ""
  pwaThemeColor: ""
  pwaBackgroundColor: ""
  appLogoLightUrl: ""
  appLogoDarkUrl: ""
  loginLogoLightUrl: ""
  loginLogoDarkUrl: ""
  loginCompanyName: ""
  loginWebsiteUrl: ""
  loginImprintUrl: ""
  loginPrivacyPolicyUrl: ""

  # Behaviour
  allowCustomJmapEndpoint: false
  stalwartFeatures: false
  extensionDirectoryUrl: ""
  logFormat: "text"
  logLevel: "info"

# OAuth / OIDC (optional)
oidc:
  enabled: false
  clientId: webmail
  issuerUrl: "https://idp.example.com"
  # Reference an existing Secret containing the client secret. Mount path is
  # /etc/bulwark/oauth-client-secret; OAUTH_CLIENT_SECRET_FILE picks it up.
  existingClientSecret: ""
  existingClientSecretKey: client-secret

# Session secret (used for cookie encryption)
session:
  # If existingSecret is empty and value is empty, the chart generates a random
  # value at install time and stores it in a Secret.
  existingSecret: ""
  existingSecretKey: session-secret
  value: ""

# Settings sync — encrypted server-side storage of user preferences.
settingsSync:
  enabled: true
  # When true and persistence.enabled is true, /app/data is backed by a PVC.
  # Otherwise it is an emptyDir (sync still works but is reset per-pod).
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    annotations: {}
  dataDir: "./data/settings"

# Extra env vars (raw containers/v1 EnvVar entries) appended to the rendered list.
extraEnv: []
extraEnvFrom: []

# -----------------------------------------------------------------------------
# Optional resources
# -----------------------------------------------------------------------------
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 0

metrics:
  enabled: false
  port: 9090
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    scheme: http
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []

networkPolicy:
  enabled: false
  ingressNamespaceSelector: {}
  additionalIngressRules: []
  additionalEgressRules: []
  # Bulwark needs to reach the JMAP server. Allow egress to the cluster DNS,
  # then to the JMAP host on these ports.
  jmapEgressPorts:
    - 443
    - 80

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
# readOnlyRootFilesystem requires writable mounts for /tmp, the Next.js cache,
# and (when settingsSync.enabled) /app/data. The chart adds these automatically;
# extraVolumes / extraVolumeMounts are only for additional mounts.
extraVolumes: []
extraVolumeMounts: []
