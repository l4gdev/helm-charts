{{- if not .Values.session.existingSecret -}}
{{- $name := printf "%s-session" (include "bulwark-mail.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $key := .Values.session.existingSecretKey | default "session-secret" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $value := .Values.session.value -}}
{{- if and (not $value) $existing -}}
  {{- $value = (index $existing.data $key | b64dec) -}}
{{- end -}}
{{- if not $value -}}
  {{- $value = randAlphaNum 64 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "bulwark-mail.labels" . | nindent 4 }}
type: Opaque
data:
  {{ $key }}: {{ $value | b64enc | quote }}
{{- end }}
