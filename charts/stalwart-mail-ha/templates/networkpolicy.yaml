{{- if .Values.networkPolicy.enabled }}
{{- $listeners := fromYamlArray (include "stalwart-mail-ha.mailListeners" .) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stalwart-mail-ha.fullname" . }}
  labels:
    {{- include "stalwart-mail-ha.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "stalwart-mail-ha.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        {{- range $listeners }}
        - protocol: TCP
          port: {{ .port }}
        {{- end }}
        {{- if .Values.listeners.http.enabled }}
        - protocol: TCP
          port: {{ .Values.listeners.http.port }}
        {{- end }}
    {{- with .Values.networkPolicy.additionalIngressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.networkPolicy.allowOutboundSmtp }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
    {{- end }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    {{- with .Values.networkPolicy.additionalEgressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
