# Single-replica "kick the tires" deployment.
# RocksDB on local PVC, filesystem blob store, internal directory.
# Not suitable for production: no HA, all state on one node.

replicaCount: 1

dataStore:
  type: rocksdb
  rocksdb:
    persistence:
      enabled: true
      size: 20Gi

publicUrl: "https://mail.example.com"

# Disable mail LoadBalancer for local clusters; use port-forward instead.
service:
  mail:
    type: ClusterIP

listeners:
  pop3:
    enabled: false
  pop3s:
    enabled: false

# First-time login uses STALWART_RECOVERY_ADMIN as a fallback admin (works in
# normal mode too, despite the name). Stalwart does not auto-create an admin
# Account on first boot, so without this you cannot log into /admin/.
# Replace `adminPassword` with `existingSecret` for real deployments.
recovery:
  enabled: false
  adminUser: admin
  adminPassword: ChangeMeOnFirstBoot
