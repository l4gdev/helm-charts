apiVersion: v2
name: stalwart-mail-ha
description: Helm chart for Stalwart Mail Server (SMTP, IMAP, JMAP, CalDAV/CardDAV) running multi-replica with all state on external backends
type: application
version: 0.1.2
appVersion: "0.16.3"
icon: https://raw.githubusercontent.com/stalwartlabs/stalwart/main/img/logo-red.svg
home: https://github.com/l4gdev/helm-charts/tree/main/charts/stalwart-mail-ha
sources:
  - https://github.com/stalwartlabs/stalwart
  - https://github.com/l4gdev/helm-charts
keywords:
  - stalwart
  - mail
  - smtp
  - imap
  - jmap
  - caldav
  - carddav
  - mailserver
  - ha
  - self-hosted
maintainers:
  - name: L4G
    email: contact@l4g.dev
kubeVersion: ">=1.23.0-0"
annotations:
  artifacthub.io/category: networking
  artifacthub.io/license: AGPL-3.0
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/l4gdev/helm-charts/tree/main/charts/stalwart-mail-ha
    - name: Stalwart Documentation
      url: https://stalw.art/docs
    - name: Stalwart GitHub
      url: https://github.com/stalwartlabs/stalwart
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: fixed
      description: Replaced 404 stalw.art logo URL with raw GitHub logo-red.svg and switched category from invalid "communication" to "networking" so ArtifactHub indexing succeeds
    - kind: fixed
      description: "config.json now uses Stalwart 0.16's `EnvironmentVariable`/`variableName` schema instead of legacy `EnvVar`/`envVar`"
    - kind: fixed
      description: "STALWART_RECOVERY_PASSWORD is rendered before STALWART_RECOVERY_ADMIN so K8s $(VAR) substitution resolves the password"
    - kind: changed
      description: "Fallback admin (STALWART_RECOVERY_ADMIN) is now wired whenever `recovery.adminPassword` or `recovery.existingSecret` is set, independent of `recovery.enabled` — this is the supported path for first-time login"
    - kind: added
      description: "values.yaml + examples + README cover cross-origin webmail (Bulwark) CORS setup with ingress-nginx annotations"
    - kind: added
      description: Initial release of Stalwart Mail HA chart for v0.16.x
