{{- if .Values.web.albums.enabled }}
{{- $component := "albums" }}
{{- $componentConfig := .Values.web.albums }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ente-photos.fullname" . }}-web-{{ $component }}-config
  labels:
    {{- include "ente-photos.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-{{ $component }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  .env.local: |
    # Ente Albums Web App Configuration
    NEXT_PUBLIC_ENTE_ENDPOINT={{ include "ente-photos.museum.apiUrl" . }}
    {{- with (include "ente-photos.web.photosUrl" .) }}
    NEXT_PUBLIC_ENTE_PHOTOS_ENDPOINT={{ . }}
    {{- end }}
    {{- with (include "ente-photos.web.albumsUrl" .) }}
    NEXT_PUBLIC_ENTE_ALBUMS_ENDPOINT={{ . }}
    {{- end }}
    {{- if $componentConfig.config }}
    {{- range $key, $value := $componentConfig.config.extra }}
    {{ $key }}={{ $value }}
    {{- end }}
    {{- end }}
{{- end }}
